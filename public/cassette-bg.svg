<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="340" height="240">
  <!-- Cassette outline — TDK Chrome style -->
  <g transform="translate(50, 45)">
    <!-- Body -->
    <rect x="0" y="0" width="240" height="150" rx="10" fill="none" stroke="#111" stroke-width="3"/>
    <rect x="8" y="8" width="224" height="134" rx="6" fill="none" stroke="#111" stroke-width="1.5"/>
    <!-- Label area -->
    <rect x="30" y="12" width="180" height="72" rx="4" fill="none" stroke="#111" stroke-width="1.2"/>
    <!-- Label lines (TDK chrome style) -->
    <line x1="30" y1="28" x2="210" y2="28" stroke="#111" stroke-width="3.5"/>
    <line x1="30" y1="42" x2="210" y2="42" stroke="#111" stroke-width="1.1"/>
    <line x1="30" y1="53" x2="194" y2="53" stroke="#111" stroke-width="1.1"/>
    <line x1="30" y1="63" x2="174" y2="63" stroke="#111" stroke-width="1"/>
    <line x1="30" y1="72" x2="152" y2="72" stroke="#111" stroke-width="0.8"/>
    <!-- TDK-style logo box -->
    <rect x="34" y="14" width="40" height="13" rx="2" fill="none" stroke="#111" stroke-width="1"/>
    <line x1="46" y1="14" x2="46" y2="27" stroke="#111" stroke-width="0.8"/>
    <line x1="60" y1="14" x2="60" y2="27" stroke="#111" stroke-width="0.8"/>
    <!-- Tape window -->
    <rect x="56" y="88" width="128" height="40" rx="4" fill="none" stroke="#111" stroke-width="2.2"/>
    <!-- Left reel -->
    <circle cx="91" cy="108" r="14" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="91" cy="108" r="6" fill="none" stroke="#111" stroke-width="1.5"/>
    <line x1="91" y1="94" x2="91" y2="102" stroke="#111" stroke-width="1.5"/>
    <line x1="91" y1="114" x2="91" y2="122" stroke="#111" stroke-width="1.5"/>
    <line x1="77" y1="108" x2="85" y2="108" stroke="#111" stroke-width="1.5"/>
    <line x1="97" y1="108" x2="105" y2="108" stroke="#111" stroke-width="1.5"/>
    <!-- Right reel -->
    <circle cx="149" cy="108" r="14" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="149" cy="108" r="6" fill="none" stroke="#111" stroke-width="1.5"/>
    <line x1="149" y1="94" x2="149" y2="102" stroke="#111" stroke-width="1.5"/>
    <line x1="149" y1="114" x2="149" y2="122" stroke="#111" stroke-width="1.5"/>
    <line x1="135" y1="108" x2="143" y2="108" stroke="#111" stroke-width="1.5"/>
    <line x1="155" y1="108" x2="163" y2="108" stroke="#111" stroke-width="1.5"/>
    <!-- Tape path between reels -->
    <path d="M91 122 Q120 126 149 122" fill="none" stroke="#111" stroke-width="1"/>
    <!-- Left side hole -->
    <circle cx="16" cy="108" r="7.5" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="16" cy="108" r="3.5" fill="none" stroke="#111" stroke-width="1.2"/>
    <!-- Right side hole -->
    <circle cx="224" cy="108" r="7.5" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="224" cy="108" r="3.5" fill="none" stroke="#111" stroke-width="1.2"/>
    <!-- Bottom notches -->
    <rect x="42" y="138" width="14" height="7" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <rect x="80" y="138" width="14" height="7" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <rect x="146" y="138" width="14" height="7" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
    <rect x="184" y="138" width="14" height="7" rx="2" fill="none" stroke="#111" stroke-width="1.2"/>
  </g>
</svg>
